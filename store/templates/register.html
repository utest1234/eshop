{% extends 'layout.html' %}

{% block content %}

<header class="bg-dark-py-5">
    <div class="container px-4 px-lg-5 my-5">
        <div class="text-center text-white">
            <h1 class="display-4 fw-bolder">Бүртгэх хуудас</h1>
            <p class="lead fw-normal text-white-50 mb-0">Манай дэлгүүрт бүртгүүлнэ үү</p>
        </div>
    </div>
</header>
<div class="container">
    <div class="row">
        <div class="col-md-6 offset-md-3">   
            <br>
            <form action="{% url 'register' %}" method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <br><br>
                <button type="submit" class="btn btn-primary">Бүртгүүлэх</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
